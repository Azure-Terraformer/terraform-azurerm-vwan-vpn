name: tftest-vwan-vpn-simple

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]

jobs:
  terraform-tests:
    runs-on: ubuntu-latest

    env:
      # AzureRM provider auth
      ARM_CLIENT_ID: ${{ secrets.TERRAFORM_TEST_AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.TERRAFORM_TEST_AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.TERRAFORM_TEST_AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.TERRAFORM_TEST_AZURE_TENANT_ID }}

      # Make Terraform non-interactive
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.4"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      # Run each test file explicitly so failures are obvious
      - name: Test - Storage modes (apply)
        run: terraform test -filter=tests/vwan-simple.tftest.hcl -verbose
